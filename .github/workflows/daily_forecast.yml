name: Daily Forecast

on:
  schedule:
    - cron: '0 19 * * *'  # 19:00 UTC (20:00 CET)
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13.5'

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: data/
          key: data-cache-${{ github.run_number }}
          restore-keys: |
            data-cache-

      - name: Restore forecast history from gh-pages
        run: |
          mkdir -p deploy/data
          gh api repos/${{ github.repository }}/contents/data/forecast_history.json?ref=gh-pages \
            --jq '.content' | base64 -d > deploy/data/forecast_history.json 2>/dev/null || true
          if [ -s deploy/data/forecast_history.json ]; then
            echo "Restored $(python -c 'import json;print(len(json.load(open("deploy/data/forecast_history.json"))))') history entries from gh-pages"
          else
            echo "No existing history on gh-pages, starting fresh"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run forecast (includes data update)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.deploy.inference

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy

      - name: Upload updated data to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload data-latest \
            data/processed/merged_dataset_hourly.parquet \
            --clobber
